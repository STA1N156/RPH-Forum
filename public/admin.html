    <script>
        const { createApp, ref, reactive, computed, onMounted } = Vue;

        createApp({
            setup() {
                const API_BASE = '';
                const token = ref(localStorage.getItem('admin_token') || '');
                const isAuthenticated = ref(false);
                const adminUser = ref(null);
                const currentPage = ref('dashboard');
                const showMobileMenu = ref(false);
                const toasts = ref([]);

                // Login
                const loginForm = reactive({ username: '', password: '' });
                const loginError = ref('');
                const loginLoading = ref(false);

                // Stats
                const stats = ref({});

                // Cards
                const cardData = ref({ cards: [], total: 0, totalPages: 0 });
                const cardPage = ref(1);
                const cardSearch = ref('');

                // Comments
                const commentData = ref({ comments: [], total: 0, totalPages: 0 });
                const commentPage = ref(1);

                // Users
                const userData = ref({ users: [], total: 0, totalPages: 0 });
                const userPage = ref(1);
                const userSearch = ref('');
                const userDrafts = reactive({});

                // Logs
                const logData = ref({ logs: [], total: 0, totalPages: 0 });
                const logPage = ref(1);
                const logActionFilter = ref('');

                // Chart
                const chartData = computed(() => {
                    if (!stats.value.dailyActivity) return [];
                    const activity = stats.value.dailyActivity ?? [];
                    const comments = stats.value.dailyComments ?? [];
                    const visits = stats.value.dailyVisits ?? [];
                    const days = [];
                    for (let i = 6; i >= 0; i--) {
                        const d = new Date(); d.setDate(d.getDate() - i);
                        const dateStr = d.toISOString().slice(0, 10);
                        const label = (d.getMonth()+1) + '/' + d.getDate();
                        const a = activity.find(x => x.day === dateStr);
                        const c = comments.find(x => x.day === dateStr);
                        const v = visits.find(x => x.day === dateStr);
                        days.push({
                            date: dateStr, label,
                            uploads: a ? (a.uploads || 0) : 0,
                            downloads: a ? (a.downloads || 0) : 0,
                            comments: c ? (c.comments || 0) : 0,
                            visits: v ? (v.visits || 0) : 0
                        });
                    }
                    return days;
                });
                const chartMax = computed(() => {
                    if (!chartData.value.length) return 1;
                    const max = Math.max(...chartData.value.flatMap(d => [d.uploads, d.downloads, d.comments, d.visits]));
                    return max || 1;
                });

                // Settings
                const siteSettings = reactive({
                    site_name: '',
                    site_description: '',
                    allow_anonymous_upload: 'true',
                    allow_anonymous_comment: 'true',
                    popular_tags: '',
                    tag_library: '',
                    hidden_popular_tags: '',
                    hidden_tag_library: '',
                    announcement_content: 'ç¦پو­¢ن¸ٹن¼ وœھو‰“و ‡ç­¾çڑ„è§’è‰²هچ،\nç¦پو­¢ن¸ٹن¼ é…’é¦†ه’Œé‌‍è‡ھهˆ¶هچ،\nç¦پو­¢وپ¶و„ڈوڈگن؛¤è¯„è®؛/و³¨ه†Œ\nç¦پو­¢R18ه†…ه®¹ن¸چو‰“R18و ‡ç­¾',
                    announcement_enabled: 'true',
                    announcement_version: '1'
                });
                const tagPreviewCards = ref([]);
                const tagEditor = reactive({
                    popular: [],
                    library: []
                });
                const hiddenTagState = reactive({
                    popular: [],
                    library: []
                });
                const savedTagSnapshot = reactive({
                    popular: '',
                    library: '',
                    hiddenPopular: '',
                    hiddenLibrary: ''
                });
                const tagInput = reactive({
                    popular: '',
                    library: ''
                });
                const tagEditing = reactive({
                    popular: { index: -1, value: '' },
                    library: { index: -1, value: '' }
                });
                const batchDraft = reactive({
                    popular: { open: false, action: 'append', text: '' },
                    library: { open: false, action: 'append', text: '' }
                });
                const batchActionOptions = [
                    { value: 'append', label: 'و‰¹é‡ڈè؟½هٹ ' },
                    { value: 'replace', label: 'و•´ç»„و›؟وچ¢' },
                    { value: 'hide', label: 'و‰¹é‡ڈéڑگè—ڈ' },
                    { value: 'restore', label: 'و‰¹é‡ڈوپ¢ه¤چ' }
                ];
                const settingsSaving = ref(false);
                const tagPreviewCounts = computed(() => {
                    const counts = {};
                    for (const card of tagPreviewCards.value) {
                        for (const tag of extractCardTags(card)) {
                            counts[tag] = (counts[tag] || 0) + 1;
                        }
                    }
                    return counts;
                });
                const popularTagPreview = computed(() => {
                    const hiddenSet = new Set(hiddenTagState.popular);
                    const configured = tagEditor.popular.filter(tag => !hiddenSet.has(tag));
                    if (configured.length > 0) {
                        return configured;
                    }
                    return Object.entries(tagPreviewCounts.value)
                        .filter(([tag]) => !hiddenSet.has(tag))
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 20)
                        .map(([tag]) => tag);
                });
                const tagLibraryPreview = computed(() => {
                    const hiddenSet = new Set(hiddenTagState.library);
                    const configured = tagEditor.library.filter(tag => !hiddenSet.has(tag));
                    const ranked = Object.entries(tagPreviewCounts.value)
                        .filter(([tag]) => !hiddenSet.has(tag))
                        .sort((a, b) => b[1] - a[1]);
                    if (configured.length === 0) {
                        return ranked.map(([tag, count]) => ({ tag, count }));
                    }
                    const configuredSet = new Set(configured);
                    return [
                        ...configured.map(tag => ({ tag, count: tagPreviewCounts.value[tag] || 0 })),
                        ...ranked.filter(([tag]) => !configuredSet.has(tag)).map(([tag, count]) => ({ tag, count }))
                    ];
                });
                const tagSettingsDirty = computed(() => {
                    return savedTagSnapshot.popular !== tagEditor.popular.join('\n')
                        || savedTagSnapshot.library !== tagEditor.library.join('\n')
                        || savedTagSnapshot.hiddenPopular !== hiddenTagState.popular.join('\n')
                        || savedTagSnapshot.hiddenLibrary !== hiddenTagState.library.join('\n');
                });

                // Password
                const passwordForm = reactive({ currentPassword: '', newPassword: '', confirmPassword: '' });
                const passwordError = ref('');
                const passwordSuccess = ref('');

                function authHeaders() {
                    return { 'Authorization': 'Bearer ' + token.value, 'Content-Type': 'application/json' };
                }

                function showToast(message, type = 'info') {
                    const id = Date.now();
                    toasts.value.push({ id, message, type });
                    setTimeout(() => { toasts.value = toasts.value.filter(t => t.id !== id); }, 3000);
                }

                function formatDate(dateStr) {
                    if (!dateStr) return '-';
                    return new Date(dateStr).toLocaleString('zh-CN');
                }

                function parseTagSettingInput(value) {
                    return String(value || '')
                        .split(/[\n,ï¼Œ]/)
                        .map(item => item.trim())
                        .filter(Boolean)
                        .filter((item, index, array) => array.indexOf(item) === index);
                }

                function syncTagEditorFromSettings() {
                    tagEditor.popular = parseTagSettingInput(siteSettings.popular_tags);
                    tagEditor.library = parseTagSettingInput(siteSettings.tag_library);
                    hiddenTagState.popular = parseTagSettingInput(siteSettings.hidden_popular_tags);
                    hiddenTagState.library = parseTagSettingInput(siteSettings.hidden_tag_library);
                    resetTagInteractionState();
                }

                function captureSavedTagSnapshot() {
                    savedTagSnapshot.popular = tagEditor.popular.join('\n');
                    savedTagSnapshot.library = tagEditor.library.join('\n');
                    savedTagSnapshot.hiddenPopular = hiddenTagState.popular.join('\n');
                    savedTagSnapshot.hiddenLibrary = hiddenTagState.library.join('\n');
                }

                function restoreSavedTagSnapshot() {
                    tagEditor.popular = parseTagSettingInput(savedTagSnapshot.popular);
                    tagEditor.library = parseTagSettingInput(savedTagSnapshot.library);
                    hiddenTagState.popular = parseTagSettingInput(savedTagSnapshot.hiddenPopular);
                    hiddenTagState.library = parseTagSettingInput(savedTagSnapshot.hiddenLibrary);
                    resetTagInteractionState();
                    syncSettingsFromTagEditor();
                }

                function resetTagInteractionState() {
                    tagInput.popular = '';
                    tagInput.library = '';
                    cancelTagEdit('popular');
                    cancelTagEdit('library');
                    clearBatchDraft('popular');
                    clearBatchDraft('library');
                }

                function syncSettingsFromTagEditor() {
                    siteSettings.popular_tags = tagEditor.popular.join('\n');
                    siteSettings.tag_library = tagEditor.library.join('\n');
                    siteSettings.hidden_popular_tags = hiddenTagState.popular.join('\n');
                    siteSettings.hidden_tag_library = hiddenTagState.library.join('\n');
                }

                function removeHiddenTag(type, tag) {
                    hiddenTagState[type] = hiddenTagState[type].filter(item => item !== tag);
                }

                function addHiddenTag(type, tag) {
                    if (!tag) return;
                    if (hiddenTagState[type].includes(tag)) return;
                    hiddenTagState[type] = [...hiddenTagState[type], tag];
                }

                function normalizeTagBatch(value) {
                    return parseTagSettingInput(value);
                }

                function addTags(type) {
                    const incoming = normalizeTagBatch(tagInput[type]);
                    if (!incoming.length) return;
                    incoming.forEach(tag => removeHiddenTag(type, tag));
                    const merged = [...tagEditor[type], ...incoming];
                    tagEditor[type] = merged.filter((item, index, array) => item && array.indexOf(item) === index);
                    tagInput[type] = '';
                    syncSettingsFromTagEditor();
                }

                function appendTagToBatchDraft(type, tag) {
                    const incoming = normalizeTagBatch(tag);
                    if (!incoming.length) return;
                    const merged = [...normalizeTagBatch(batchDraft[type].text), ...incoming]
                        .filter((item, index, array) => item && array.indexOf(item) === index);
                    batchDraft[type].text = merged.join('\n');
                }

                function isTagEditorOpen(type) {
                    return tagEditing[type].index >= 0;
                }

                function closeTagEditor(type) {
                    cancelTagEdit(type);
                }

                function adoptPreviewTag(type, tag) {
                    const normalized = normalizeTagBatch(tag);
                    if (!normalized.length) return;
                    const nextTag = normalized[0];
                    removeHiddenTag(type, nextTag);
                    if (tagEditor[type].includes(nextTag)) {
                        startTagEdit(type, tagEditor[type].indexOf(nextTag));
                        syncSettingsFromTagEditor();
                        return;
                    }
                    tagEditor[type] = [...tagEditor[type], nextTag];
                    syncSettingsFromTagEditor();
                }

                function removeTag(type, index) {
                    const removedTag = tagEditor[type][index];
                    tagEditor[type] = tagEditor[type].filter((_, itemIndex) => itemIndex !== index);
                    addHiddenTag(type, removedTag);
                    if (tagEditing[type].index === index) {
                        cancelTagEdit(type);
                    }
                    syncSettingsFromTagEditor();
                }

                function startTagEdit(type, index) {
                    batchDraft[type].open = false;
                    tagEditing[type].index = index;
                    tagEditing[type].value = tagEditor[type][index] || '';
                }

                function cancelTagEdit(type) {
                    tagEditing[type].index = -1;
                    tagEditing[type].value = '';
                }

                function isEditingTag(type, index) {
                    return tagEditing[type].index === index;
                }

                function confirmTagEdit(type) {
                    const index = tagEditing[type].index;
                    if (index < 0) return;
                    const nextValue = String(tagEditing[type].value || '').trim();
                    const previousValue = tagEditor[type][index] || '';
                    if (!nextValue) {
                        removeTag(type, index);
                        return;
                    }
                    if (tagEditor[type].some((item, itemIndex) => item === nextValue && itemIndex !== index)) {
                        showToast('و ‡ç­¾ه·²ه­کهœ¨ï¼Œو— éœ€é‡چه¤چو·»هٹ ', 'warning');
                        return;
                    }
                    if (previousValue && previousValue !== nextValue) {
                        addHiddenTag(type, previousValue);
                    }
                    removeHiddenTag(type, nextValue);
                    tagEditor[type] = tagEditor[type].map((item, itemIndex) => itemIndex === index ? nextValue : item);
                    cancelTagEdit(type);
                    syncSettingsFromTagEditor();
                }

                function deleteEditingTag(type) {
                    const index = tagEditing[type].index;
                    if (index < 0) return;

                function applyBatchTags(type) {
                    const action = batchDraft[type].action;
                    const incoming = normalizeTagBatch(batchDraft[type].text);
                    if (!incoming.length) {
                        showToast('è¯·ه…ˆè¾“ه…¥è¦پو‰¹é‡ڈه¤„çگ†çڑ„و ‡ç­¾', 'warning');
                        return;
                    }

                    if (action === 'append') {
                        incoming.forEach(tag => removeHiddenTag(type, tag));
                        tagEditor[type] = [...tagEditor[type], ...incoming].filter((item, index, array) => item && array.indexOf(item) === index);
                    }

                    if (action === 'replace') {
                        incoming.forEach(tag => removeHiddenTag(type, tag));
                        tagEditor[type] = incoming;
                        cancelTagEdit(type);
                    }

                    if (action === 'hide') {
                        incoming.forEach(tag => {
                            tagEditor[type] = tagEditor[type].filter(item => item !== tag);
                            addHiddenTag(type, tag);
                        });
                        cancelTagEdit(type);
                    }

                    if (action === 'restore') {
                        incoming.forEach(tag => removeHiddenTag(type, tag));
                    }

                    syncSettingsFromTagEditor();
                    batchDraft[type].text = '';
                    showToast('و‰¹é‡ڈو“چن½œه·²ه؛”ç”¨هˆ°ه½“ه‰چèچ‰ç¨؟', 'success');

                function extractCardTags(card) {
                    if (!card) return [];
                    if (Array.isArray(card.tags)) {
                        return card.tags.map(item => String(item || '').trim()).filter(Boolean);
                    }
                    const text = String(card.creator_notes || '');
                    const tags = [];
                    const regex = /#(\S+)/g;
                    let match;
                    while ((match = regex.exec(text)) !== null) {
                        if (match[1]) tags.push(match[1].trim());
                    }
                    return tags.filter((item, index, array) => item && array.indexOf(item) === index);
                }
